name: Build Android APK

on:
  push:
    branches: [ main, "feat/**", "fix/**", "feature/**" ]
    paths:
      - 'assets/data/content.json'
      - 'assets/data/quran_db.db'
      - 'quran_formatted.json'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python dependencies
        run: pip3 install Pillow

      - name: Ensure Signing Keystore
        run: python3 scripts/ensure_keystore.py

      - name: Update App Resources from CMS (Icons & Audio)
        run: python3 scripts/update_resources.py

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (64-bit focus)
        run: flutter build apk --release --target-platform android-arm64,android-x64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aldhakereen-apk
          path: build/app/outputs/flutter-apk/*.apk
