<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - نظام إدارة محتوى الذاكرين</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; background-color: #f0f2f5; }
        .sidebar { background: #1a252f; color: white; min-height: 100vh; padding: 25px 15px; position: sticky; top: 0; }
        .nav-link { color: #aab2bd; margin-bottom: 8px; cursor: pointer; border-radius: 8px; transition: 0.3s; padding: 12px; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: #D4AF37; color: black; font-weight: bold; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .btn-gold { background: #D4AF37; color: black; font-weight: bold; border: none; }
        .btn-gold:hover { background: #b8962d; }
        .header-bar { background: white; padding: 20px 30px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .content-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .content-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 sidebar">
                <div class="text-center mb-4">
                    <h4 class="text-white">الذاكرين CMS</h4>
                    <span class="badge bg-warning text-dark">لوحة التحكم</span>
                </div>
                <hr class="text-secondary">
                <nav class="nav flex-column">
                    <a class="nav-link active" onclick="showSection('quran')">القرآن الكريم</a>
                    <a class="nav-link" onclick="showSection('duas')">الأدعية</a>
                    <a class="nav-link" onclick="showSection('visits')">الزيارات</a>
                    <a class="nav-link" onclick="showSection('tafsir')">التفسير</a>
                    <a class="nav-link" onclick="showSection('dreams')">تفسير الأحلام</a>
                    <a class="nav-link" onclick="showSection('stories')">قصص الأنبياء</a>
                    <a class="nav-link" onclick="showSection('imam_ali')">موسوعة الإمام علي (ع)</a>
                    <hr class="text-secondary">
                    <a class="nav-link" onclick="showSection('about')">حول المطور</a>
                    <a class="nav-link" onclick="showSection('settings')">إعدادات المظهر</a>
                </nav>
            </div>

            <div class="col-lg-10 p-4">
                <div class="header-bar">
                    <h3 id="section-title">القرآن الكريم</h3>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-dark" onclick="openBatchAdd()">إضافة مجموعة</button>
                        <button class="btn btn-gold" onclick="openAddModal()">إضافة عنصر جديد</button>
                    </div>
                </div>

                <div class="card main-card p-4">
                    <div id="content-display">
                        <!-- Content dynamic loading -->
                    </div>
                </div>

                <div class="sticky-bottom bg-white p-3 border-top d-flex justify-content-between align-items-center">
                    <div class="text-muted small">سيتم تحديث ملف <code>content.json</code> وبناء APK جديد عند الحفظ عبر GitHub.</div>
                    <button class="btn btn-success btn-lg px-5" onclick="pushToGitHub()">حفظ وإرسال للتطبيق (GitHub)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title">تحرير المحتوى</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">العنوان</label>
                        <input type="text" id="modal-title-input" class="form-control form-control-lg">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">المحتوى الكامل</label>
                        <textarea id="modal-content-input" class="form-control" rows="15" style="white-space: pre-wrap;"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-gold" onclick="saveCurrentItem()">حفظ العنصر</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Batch Modal -->
    <div class="modal fade" id="batchModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5>إضافة مجموعة (JSON)</h5></div>
                <div class="modal-body">
                    <textarea id="batch-input" class="form-control" rows="10" placeholder='[{"title": "...", "content": "..."}]'></textarea>
                </div>
                <div class="modal-footer"><button class="btn btn-primary" onclick="processBatch()">إضافة</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSection = 'quran';
        let config = {};
        let editingIndex = -1;
        const itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
        const batchModal = new bootstrap.Modal(document.getElementById('batchModal'));

        async function init() {
            try {
                const res = await fetch('../../assets/data/content.json');
                config = await res.json();
                showSection('quran');
            } catch (e) { alert('خطأ في تحميل البيانات.'); }
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeLink = document.querySelector(`[onclick="showSection('${section}')"]`);
            if(activeLink) {
                activeLink.classList.add('active');
                document.getElementById('section-title').innerText = activeLink.innerText;
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('content-display');
            container.innerHTML = '';
            if (sectionIsList(currentSection)) {
                const items = config[currentSection] || [];
                items.forEach((item, index) => {
                    container.innerHTML += `
                        <div class="content-item d-flex justify-content-between align-items-center">
                            <div><h6 class="mb-1 fw-bold">${item.title}</h6></div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" onclick="editItem(${index})">تعديل</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${index})">حذف</button>
                            </div>
                        </div>
                    `;
                });
            } else if (currentSection === 'about') {
                container.innerHTML = `
                    <input type="text" class="form-control mb-2" value="${config.about.developer_name}" onchange="config.about.developer_name=this.value">
                    <textarea class="form-control" rows="5" onchange="config.about.app_info=this.value">${config.about.app_info}</textarea>
                `;
            }
        }

        function sectionIsList(s) { return !['about', 'settings'].includes(s); }
        function openAddModal() { editingIndex = -1; document.getElementById('modal-title-input').value = ''; document.getElementById('modal-content-input').value = ''; itemModal.show(); }
        function editItem(index) { editingIndex = index; const item = config[currentSection][index]; document.getElementById('modal-title-input').value = item.title; document.getElementById('modal-content-input').value = item.content; itemModal.show(); }
        function saveCurrentItem() { const title = document.getElementById('modal-title-input').value; const content = document.getElementById('modal-content-input').value; if (editingIndex === -1) config[currentSection].push({ id: Date.now(), title, content }); else { config[currentSection][editingIndex].title = title; config[currentSection][editingIndex].content = content; } itemModal.hide(); renderContent(); }
        function deleteItem(index) { if(confirm('حذف؟')) { config[currentSection].splice(index, 1); renderContent(); } }
        function openBatchAdd() { document.getElementById('batch-input').value = ''; batchModal.show(); }
        function processBatch() { try { const data = JSON.parse(document.getElementById('batch-input').value); config[currentSection] = [...config[currentSection], ...data]; batchModal.hide(); renderContent(); } catch (e) { alert('JSON Error'); } }

        async function pushToGitHub() {
            const token = prompt("أدخل GitHub PAT:");
            const repo = "techtouchAI/Islamic";
            const path = "assets/data/content.json";

            if (!token) return;

            try {
                // Get current SHA
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                const data = await res.json();
                const sha = data.sha;

                // Update file
                const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "CMS: Update content.json",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2)))),
                        sha: sha
                    })
                });

                if (updateRes.ok) alert("تم الحفظ بنجاح! سيتم بناء APK جديد خلال دقائق.");
                else alert("فشل في الحفظ. تأكد من صلاحيات التوكن.");
            } catch (e) { alert("حدث خطأ في الاتصال بـ GitHub."); }
        }

        init();
    </script>
</body>
</html>
