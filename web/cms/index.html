<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الذاكرين - لوحة التحكم الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #1a252f; --light-gold: #fcf8e3; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; background-color: #f8f9fa; color: #333; }
        .sidebar { background: var(--dark); color: white; min-height: 100vh; position: sticky; top: 0; transition: 0.3s; }
        .nav-link { color: #cbd5e0; margin-bottom: 5px; cursor: pointer; border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: var(--gold); color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .main-content { padding: 30px; }
        .card-lux { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; border: none; border-radius: 12px; padding: 10px 25px; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); background: #c5a02c; }
        .action-bar { background: white; padding: 20px; border-radius: 18px; margin-bottom: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; }
        .img-preview { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; border: 2px solid var(--gold); background: #eee; }
        .upload-card { border: 2px dashed #ddd; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .upload-card:hover { border-color: var(--gold); background: var(--light-gold); }
        @media (max-width: 991.98px) {
            .sidebar { position: fixed; right: -300px; width: 300px; height: 100%; z-index: 2000; }
            .sidebar.show { right: 0; }
            .mobile-toggle { display: block; position: fixed; bottom: 25px; left: 25px; z-index: 2001; }
        }
    </style>
</head>
<body>
    <button class="btn btn-dark rounded-circle mobile-toggle d-lg-none" style="width: 60px; height: 60px;" onclick="document.getElementById('sidebar').classList.toggle('show')">
        <i class="material-icons">menu</i>
    </button>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div id="sidebar" class="col-lg-2 sidebar p-4">
                <div class="text-center mb-5">
                    <i class="material-icons text-gold" style="font-size: 3.5rem;">mosque</i>
                    <h5 class="fw-bold mt-2">الذاكرين CMS</h5>
                    <div class="badge bg-gold text-dark px-3 py-2 mt-1">الإصدار الاحترافي</div>
                </div>
                <nav class="nav flex-column" id="nav-list"></nav>
            </div>

            <!-- Main Workspace -->
            <div class="col-lg-10 main-content">
                <div class="action-bar mb-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="p-3 bg-light rounded-circle"><i class="material-icons text-gold" id="view-icon">settings</i></div>
                        <h3 class="mb-0 fw-bold" id="view-title">إعدادات التطبيق</h3>
                    </div>
                    <div id="view-actions" class="d-flex gap-2"></div>
                </div>

                <div id="workspace"></div>

                <!-- Global Sync -->
                <div class="card card-lux p-4 mt-5 border-top border-success border-4">
                    <div class="row align-items-center">
                        <div class="col-lg-8">
                            <h5 class="fw-bold"><i class="material-icons align-middle me-2">cloud_sync</i> مزامنة البيانات السحابية</h5>
                            <p class="text-muted small mb-0">سيتم تحديث التطبيق وبناء نسخة APK جديدة فور الحفظ إلى مستودع GitHub.</p>
                        </div>
                        <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                            <button class="btn btn-success btn-lg w-100 shadow" onclick="saveToGitHub()">
                                <i class="material-icons align-middle">publish</i> حفظ وإرسال للتطبيق
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 25px;">
                <div class="modal-body p-5">
                    <h4 class="fw-bold mb-4">تحرير المحتوى</h4>
                    <input type="text" id="m-title" class="form-control form-control-lg mb-4" placeholder="العنوان...">
                    <textarea id="m-content" class="form-control" rows="12" placeholder="المحتوى الكامل هنا..." style="white-space: pre-wrap; border-radius: 15px;"></textarea>
                    <div class="mt-4 text-end">
                        <button class="btn btn-light px-4 me-2" data-bs-dismiss="modal">إلغاء</button>
                        <button class="btn btn-gold px-5" onclick="saveItem()">حفظ التغييرات</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let db = null;
        let activeView = 'settings';
        let editIdx = -1;
        const modal = new bootstrap.Modal(document.getElementById('editModal'));

        async function init() {
            try {
                const res = await fetch('../../assets/data/content.json');
                db = await res.json();
                renderNav();
                loadView('settings');
            } catch (e) { alert("خطأ في تحميل قاعدة البيانات."); }
        }

        function renderNav() {
            const list = document.getElementById('nav-list');
            list.innerHTML = '';
            const links = [
                {id: 'settings', title: 'الهوية والوسائط', icon: 'palette'},
                {id: 'about', title: 'ملف المطور', icon: 'person_pin'},
                {divider: true}
            ];
            Object.keys(db.sections).forEach(k => links.push({id: k, title: db.sections[k].title, icon: db.sections[k].icon}));

            links.forEach(l => {
                if(l.divider) return list.innerHTML += '<hr class="text-secondary opacity-25 my-3">';
                list.innerHTML += `<a class="nav-link ${activeView===l.id?'active':''}" onclick="loadView('${l.id}')">
                    <i class="material-icons">${l.icon}</i> ${l.title}</a>`;
            });
        }

        function loadView(id) {
            activeView = id;
            renderNav();
            const ws = document.getElementById('workspace');
            const acts = document.getElementById('view-actions');
            const title = document.getElementById('view-title');
            const icon = document.getElementById('view-icon');
            ws.innerHTML = ''; acts.innerHTML = '';

            if (db.sections[id]) {
                const s = db.sections[id];
                title.innerText = s.title; icon.innerText = s.icon;
                acts.innerHTML = `<button class="btn btn-gold" onclick="openAdd()">إضافة موضوع جديد</button>`;
                ws.innerHTML = `<div id="list-container" class="row g-3"></div>`;
                renderItems();
            } else if (id === 'settings') {
                title.innerText = "الهوية والوسائط"; icon.innerText = "photo_library";
                ws.innerHTML = `
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card card-lux p-4 h-100">
                                <h5 class="fw-bold mb-4">شعار التطبيق (Logo)</h5>
                                <div class="upload-card mb-3" onclick="document.getElementById('logo-file').click()">
                                    <img id="logo-prev" src="${db.settings.custom_logo_base64 || '../../assets/images/logo.png'}" class="img-preview mb-3" style="width:120px;height:120px">
                                    <h6 class="fw-bold">انقر لاختيار صورة من الاستوديو</h6>
                                    <p class="text-muted small">ستظهر كأيقونة أساسية للتطبيق</p>
                                    <input type="file" id="logo-file" hidden accept="image/*" onchange="processImg(this, 'logo')">
                                </div>
                                <button class="btn btn-outline-danger btn-sm" onclick="clearImg('logo')">استعادة الافتراضي</button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card card-lux p-4 h-100">
                                <h5 class="fw-bold mb-4">الخلفية الافتراضية (Background)</h5>
                                <div class="upload-card mb-3" onclick="document.getElementById('bg-file').click()">
                                    <img id="bg-prev" src="${db.settings.custom_bg_base64 || '../../assets/images/default_bg.png'}" class="img-preview mb-3" style="width:120px;height:120px">
                                    <h6 class="fw-bold">انقر لاختيار خلفية من الاستوديو</h6>
                                    <p class="text-muted small">ستكون الخلفية الأساسية لكافة صفحات التطبيق</p>
                                    <input type="file" id="bg-file" hidden accept="image/*" onchange="processImg(this, 'bg')">
                                </div>
                                <button class="btn btn-outline-danger btn-sm" onclick="clearImg('bg')">استعادة الافتراضي</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (id === 'about') {
                title.innerText = "معلومات المطور"; icon.innerText = "contact_support";
                ws.innerHTML = `
                    <div class="card card-lux p-5 max-auto" style="max-width:900px; margin:0 auto">
                        <div class="row g-4">
                            <div class="col-md-4 text-center">
                                <div class="bg-light p-4 rounded-circle mb-3 d-inline-block"><i class="material-icons text-gold" style="font-size:4rem">${db.about.developer_icon}</i></div>
                                <input type="text" class="form-control text-center mb-3" value="${db.about.developer_icon}" onchange="db.about.developer_icon=this.value">
                                <small class="text-muted">اسم أيقونة Material</small>
                            </div>
                            <div class="col-md-8">
                                <label class="fw-bold small">اسم المطور</label>
                                <input type="text" class="form-control mb-3" value="${db.about.developer_name}" onchange="db.about.developer_name=this.value">
                                <label class="fw-bold small">رابط الصفحة</label>
                                <input type="text" class="form-control mb-3" value="${db.about.developer_page}" onchange="db.about.developer_page=this.value">
                                <label class="fw-bold small">عن التطبيق</label>
                                <textarea class="form-control" rows="6" onchange="db.about.app_info=this.value">${db.about.app_info}</textarea>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function renderItems() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            (db.content[activeView] || []).forEach((it, i) => {
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="card card-lux p-3 d-flex flex-row justify-content-between align-items-center">
                            <div class="text-truncate" style="max-width:70%">
                                <span class="badge bg-gold text-dark me-2">#${i+1}</span>
                                <span class="fw-bold">${it.title}</span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" onclick="openEdit(${i})"><i class="material-icons small">edit</i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${i})"><i class="material-icons small">delete</i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function processImg(input, type) {
            if(!input.files.length) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                if(type === 'logo') { db.settings.custom_logo_base64 = base64; document.getElementById('logo-prev').src = base64; }
                if(type === 'bg') { db.settings.custom_bg_base64 = base64; document.getElementById('bg-prev').src = base64; }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function clearImg(type) {
            if(type === 'logo') { db.settings.custom_logo_base64 = null; document.getElementById('logo-prev').src = '../../assets/images/logo.png'; }
            if(type === 'bg') { db.settings.custom_bg_base64 = null; document.getElementById('bg-prev').src = '../../assets/images/default_bg.png'; }
        }

        function openEdit(i) { editIdx = i; const it = i === -1 ? {title:'', content:''} : db.content[activeView][i]; document.getElementById('m-title').value = it.title; document.getElementById('m-content').value = it.content; modal.show(); }
        function saveItem() {
            const t = document.getElementById('m-title').value; const c = document.getElementById('m-content').value;
            if(!t || !c) return alert("املاً الحقول");
            if(editIdx === -1) db.content[activeView].push({id:Date.now(), title:t, content:c});
            else { db.content[activeView][editIdx].title = t; db.content[activeView][editIdx].content = c; }
            modal.hide(); renderItems();
        }
        function deleteItem(i) { if(confirm("حذف؟")) { db.content[activeView].splice(i, 1); renderItems(); } }

        async function saveToGitHub() {
            const token = prompt("GitHub Token:"); if(!token) return;
            const repo = "techtouchAI/Islamic"; const path = "assets/data/content.json";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: {"Authorization": `token ${token}`} });
                const sha = (await res.json()).sha;
                const update = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    method: "PUT", headers: {"Authorization": `token ${token}`},
                    body: JSON.stringify({ message: "CMS: Media & Data Update", content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), sha: sha })
                });
                if(update.ok) alert("تم الحفظ والمزامنة! جاري تحديث التطبيق.");
                else alert("فشل المزامنة.");
            } catch(e) { alert("خطأ في الاتصال."); }
        }

        init();
    </script>
</body>
</html>
