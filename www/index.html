<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الذاكرين - تطبيق إسلامي احترافي</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-light">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="app-logo">
                <span class="material-icons-round">mosque</span>
            </div>
            <h1 class="app-name">الذاكرين</h1>
            <div class="loader"></div>
        </div>
    </div>

    <!-- Sidebar / Drawer -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-profile">
                <span class="material-icons-round">account_circle</span>
                <h2>تطبيق الذاكرين</h2>
            </div>
        </div>
        <div class="sidebar-menu">
            <button class="menu-item active" data-section="home">
                <span class="material-icons-round">home</span>
                <span>الرئيسية</span>
            </button>
            <button class="menu-item" data-section="duas">
                <span class="material-icons-round">auto_stories</span>
                <span>الأدعية</span>
                <span id="duasBadge" class="badge">0</span>
            </button>
            <button class="menu-item" data-section="visits">
                <span class="material-icons-round">mosque</span>
                <span>الزيارات</span>
                <span id="visitsBadge" class="badge">0</span>
            </button>
            <button class="menu-item" data-section="notes">
                <span class="material-icons-round">edit_note</span>
                <span>الملاحظات</span>
                <span id="notesBadge" class="badge">0</span>
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item" data-section="settings">
                <span class="material-icons-round">settings</span>
                <span>الإعدادات</span>
            </button>
        </div>
    </nav>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Top App Bar -->
        <header class="app-bar">
            <div class="app-bar-right"> <!-- In RTL this is physical TOP RIGHT -->
                <button id="backBtn" class="nav-text-btn" style="display: none;">
                    <span class="material-icons-round">arrow_forward_ios</span>
                    <span>رجوع</span>
                </button>
                <button id="menuBtn" class="icon-btn" aria-label="القائمة">
                    <span class="material-icons-round">notes</span>
                </button>
            </div>
            <div class="app-bar-center">
                <h1 id="sectionTitle">الرئيسية</h1>
            </div>
            <div class="app-bar-left">
                <button id="addBtn" class="icon-btn primary-bg" aria-label="إضافة" style="display: none;">
                    <span class="material-icons-round">add</span>
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div id="searchWrapper" class="search-wrapper" style="display: none;">
            <div class="search-bar">
                <span class="material-icons-round">search</span>
                <input type="text" id="searchInput" placeholder="ابحث هنا...">
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="mainContent" class="scroll-area section-transition">
            <!-- Home Section -->
            <section id="home-section" class="app-section active">
                <div class="home-card clock-card">
                    <div id="digitalClock" class="digital-clock">00:00:00</div>
                    <div class="date-container">
                        <div id="hijriDate" class="hijri-date">1 ذوالقعدة 1447</div>
                        <div id="gregorianDate" class="gregorian-date">...</div>
                    </div>
                </div>

                <div class="daily-title">محتوى اليوم المختار</div>

                <div id="dailyDua" class="home-card content-card">
                    <div class="card-tag">دعاء اليوم</div>
                    <h3 id="dailyDuaTitle">...</h3>
                    <p id="dailyDuaText" class="card-excerpt">...</p>
                </div>

                <div id="dailyVisit" class="home-card content-card">
                    <div class="card-tag">زيارة اليوم</div>
                    <h3 id="dailyVisitTitle">...</h3>
                    <p id="dailyVisitText" class="card-excerpt">...</p>
                </div>
            </section>

            <!-- Grid Container -->
            <div id="contentGrid" class="content-grid" style="display: none;"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay"></div>

    <!-- Add/Edit Modal -->
    <div id="contentModal" class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">إضافة جديد</h2>
            <button class="close-modal"><span class="material-icons-round">close</span></button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>العنوان</label>
                <input type="text" id="itemTitle" placeholder="أدخل العنوان هنا...">
            </div>
            <div class="input-group">
                <label>المحتوى</label>
                <textarea id="itemContent" rows="8" placeholder="أدخل النص هنا..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button id="saveItemBtn" class="btn btn-primary">حفظ البيانات</button>
        </div>
    </div>

    <!-- Reader View -->
    <div id="readerView" class="reader-view">
        <div class="reader-header">
            <button id="closeReader" class="nav-text-btn">
                <span class="material-icons-round">arrow_forward_ios</span>
                <span>رجوع</span>
            </button>
            <div class="reader-actions">
                <button id="copyBtn" class="icon-btn"><span class="material-icons-round">content_copy</span></button>
                <button id="shareBtn" class="icon-btn"><span class="material-icons-round">share</span></button>
            </div>
        </div>
        <div class="reader-content-wrapper">
            <div class="reader-border">
                <h2 id="readerTitle"></h2>
                <div id="readerText" class="reader-text"></div>
            </div>
        </div>
        <div class="reader-toolbar">
            <button id="decreaseFont" class="font-control-btn"><span>-</span></button>
            <span class="font-label">Aa</span>
            <button id="increaseFont" class="font-control-btn"><span>+</span></button>
            <span id="fontSizeLabel" class="font-size-indicator">100%</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
